name: Release

on:
  # Publish when a GitHub Release is published (tag it, write notes, publish).
  release:
    types: [published]
  # Manual escape hatch for re-runs.
  workflow_dispatch:

# id-token: write is what enables npm provenance + OIDC Trusted Publishing.
# No long-lived NPM_TOKEN is stored anywhere.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build + publish (provenance)
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install (frozen lockfile, no scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Publish gates run explicitly here because .npmrc ignore-scripts disables
      # the prepublishOnly hook during `npm publish`.
      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build
        run: pnpm run build

      # Trusted Publishing requires a recent npm (>= 11.5.1) for OIDC exchange.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      # With a Trusted Publisher configured on npmjs.com for this repo+workflow,
      # no token is needed and provenance is attached automatically.
      - name: Publish to npm
        run: npm publish --provenance --access public
