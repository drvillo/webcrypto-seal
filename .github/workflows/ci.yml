name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for every job in this workflow.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck / unit / build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # Reproducible install: fails if pnpm-lock.yaml drifts or is tampered with.
      # --ignore-scripts is redundant with .npmrc but explicit here as a hard gate.
      - name: Install (frozen lockfile, no scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build
        run: pnpm run build

      # Verify the published tarball only contains what "files" allows.
      - name: Inspect publish contents
        run: npm pack --dry-run

  browser:
    name: browser tests (chromium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: pnpm

      - name: Install (frozen lockfile, no scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Playwright browsers are fetched explicitly (install scripts are disabled).
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser tests
        run: pnpm run test:browser

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: pnpm

      - name: Install (frozen lockfile, no scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Fail the build on known high/critical advisories in the dependency tree.
      - name: Audit
        run: pnpm audit --audit-level=high
